<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#0b0d12" />
    <title>Agent Home — Offline</title>
    <style>
      html, body { height: 100%; margin: 0; }
      body {
        display: flex; align-items: center; justify-content: center;
        background: #0b0d12; color: #e6e9ef;
        font-family: ui-sans-serif, system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
        padding: env(safe-area-inset-top) 1.5rem env(safe-area-inset-bottom);
        text-align: center;
      }
      .card { max-width: 22rem; }
      h1 { font-size: 1.1rem; margin: 0 0 .5rem; }
      p { color: #8b93a7; font-size: .9rem; margin: 0 0 1.25rem; }
      button {
        min-height: 44px; width: 100%;
        border: 0; border-radius: .75rem;
        background: #5b8cff; color: #fff; font-weight: 600; font-size: .95rem;
      }
    </style>
  </head>
  <body>
    <div class="card" data-component="OfflineShell">
      <h1>You're offline</h1>
      <p>Agent Home needs a connection to reach your agent. Reconnect and try again.</p>
      <button onclick="location.reload()">Retry</button>
    </div>
  </body>
</html>
